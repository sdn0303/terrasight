services:
  db:
    image: postgis/postgis:16-3.4
    platform: linux/amd64
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_DB: realestate
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpass}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./services/backend/docker/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d realestate"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./services/backend
      target: runtime
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://app:${DB_PASSWORD:-devpass}@db:5432/realestate
      REINFOLIB_API_KEY: ${REINFOLIB_API_KEY:-}
      RUST_LOG: ${RUST_LOG:-info}
      ALLOWED_ORIGINS: http://localhost:3001
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./services/frontend
      target: runner
      args:
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN:-}
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./data/fgb:/usr/share/nginx/html/data/fgb:ro
      - ./services/frontend/public/wasm:/usr/share/nginx/html/wasm:ro
    ports:
      - "13001:3000"
    restart: unless-stopped

volumes:
  pgdata:
